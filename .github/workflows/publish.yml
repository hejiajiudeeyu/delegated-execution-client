name: Publish Client Package

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: "Workspace package name to publish (primary public package: @delexec/ops)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run test:packages
      - run: npm publish --workspace "${{ inputs.workspace }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
